<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light" />
<title>しりとりアプリ</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<section id="screen-mode-select" class="screen">
  <h1>しりとりアプリ</h1>
  <p>モードを選んでください。</p>
  <div id="mode-list" class="mode-list"></div>
</section>

<section id="screen-mode-description" class="screen hidden">
  <h2 id="mode-title"></h2>
  <p id="mode-description"></p>
  <div class="button-row">
    <button id="start-game-btn">ゲームスタート</button>
    <button id="back-to-select-btn" class="secondary">モード選択に戻る</button>
  </div>
</section>

<section id="screen-game" class="screen hidden">
  <h2>しりとり</h2>

  <p id="game-over-banner" class="banner hidden"></p>

  <p>直前の単語: <strong id="current-word">-</strong></p>

  <form id="word-form">
    <input id="word-input" type="text" autocomplete="off" placeholder="次の単語を入力" />
    <button type="submit">送信</button>
  </form>

  <p id="error-message" class="error hidden"></p>

  <h3>履歴</h3>
  <ol id="history-list" class="history-list"></ol>

  <div class="button-row">
    <button id="reset-btn">リセット</button>
    <button id="back-to-select-from-game-btn" class="secondary">モード選択に戻る</button>
  </div>
</section>

<section id="screen-vocab-game" class="screen hidden">
  <h2>CPU対戦</h2>

  <p id="vocab-game-over-banner" class="banner hidden"></p>

  <div class="vocab-status-row">
    <p>スコア: <strong id="vocab-score">0</strong></p>
    <p>ターン数: <strong id="vocab-turn-count">0</strong></p>
  </div>

  <p>CPUの単語: <strong id="vocab-cpu-word">-</strong></p>
  <p id="vocab-thinking" class="thinking hidden">CPUが考えています...</p>
  <p id="vocab-timer" class="timer hidden"><span id="vocab-timer-seconds">10</span> 秒</p>

  <form id="vocab-word-form">
    <input id="vocab-word-input" type="text" autocomplete="off" placeholder="次の単語を入力" disabled />
    <button type="submit" disabled>送信</button>
  </form>

  <p id="vocab-error-message" class="error hidden"></p>

  <h3>履歴</h3>
  <ol id="vocab-history-list" class="history-list"></ol>

  <div class="button-row">
    <button id="vocab-reset-btn">リセット</button>
    <button id="vocab-back-to-select-btn" class="secondary">モード選択に戻る</button>
  </div>
</section>

<section id="screen-timeattack-game" class="screen hidden">
  <h2>タイムアタック</h2>

  <p id="timeattack-timer" class="timer timeattack-timer">3:00</p>

  <p id="timeattack-game-over-banner" class="banner hidden"></p>

  <div class="vocab-status-row">
    <p>スコア: <strong id="timeattack-score">0</strong></p>
    <p>単語数: <strong id="timeattack-word-count">0</strong></p>
  </div>

  <p>直前の単語: <strong id="timeattack-current-word">-</strong></p>

  <form id="timeattack-word-form">
    <input id="timeattack-word-input" type="text" autocomplete="off" placeholder="次の単語を入力" />
    <button type="submit">送信</button>
  </form>

  <p id="timeattack-error-message" class="error hidden"></p>

  <h3>履歴</h3>
  <ol id="timeattack-history-list" class="history-list"></ol>

  <div class="button-row">
    <button id="timeattack-reset-btn">リセット</button>
    <button id="timeattack-back-to-select-btn" class="secondary">モード選択に戻る</button>
  </div>
</section>

<script src="app.js"></script>

</body>
</html>
